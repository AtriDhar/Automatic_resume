<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARS-MME — Agent Console</title>
    <meta name="description" content="The ARS-MME console: five agents verify, scan, match, and synthesize your resume in real time." />
    <meta name="theme-color" content="#0A0E14" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
    <script>
      /* DESIGN.md tokens — Agentic Control Room.
         All UI color/font classes must come from this config, never Tailwind defaults. */
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              base: '#0A0E14',
              surface: { 1: '#111721', 2: '#1A2230', 3: '#232D3F' },
              ink: { DEFAULT: '#E6EBF2', muted: '#8B98AB', faint: '#5A6678' },
              accent: { DEFAULT: '#22D3EE', ink: '#06282E' },
              ok: '#34D399',
              warn: '#FBBF24',
              err: '#F87171',
              paper: { DEFAULT: '#FDFDFB', ink: '#1C2128', muted: '#57606B' },
            },
            fontFamily: {
              sans: ['Geist', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              doc: ['"Source Serif 4"', 'Georgia', 'serif'],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Geist', system-ui, sans-serif;
        background-color: #0A0E14;
        color: #E6EBF2;
      }
      ::selection { background: rgba(34, 211, 238, 0.25); }
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #111721; }
      ::-webkit-scrollbar-thumb { background: #232D3F; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #2E3A50; }

      .terminal-cursor::after {
        content: '▋';
        animation: blink 1s step-start infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }

      /* Pipeline rail (DESIGN.md signature pattern #1) */
      .stage-thread {
        position: absolute; left: 7px; top: 20px; bottom: -4px;
        width: 2px; background: #232D3F;
      }
      .stage-thread.done { background: rgba(52, 211, 153, 0.45); }
      .stage-dot-active { box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.12); }

      /* Paper document (DESIGN.md signature pattern #2) */
      .paper-sheet {
        background: #FDFDFB; color: #1C2128;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.45), 0 1px 3px rgba(0, 0, 0, 0.3);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.32.0",
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
