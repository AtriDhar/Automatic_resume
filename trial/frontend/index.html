<!DOCTYPE html>
<html>
  <head>
    <title>ARS-MME</title>
  </head>
  <body>
    <h1>ARS-MME</h1>

    <button onclick="checkBackend()">
      Check Backend Status
    </button>

    <p id="status"></p>

    <script>
      function checkBackend() {
        document.getElementById("status").innerText =
          "Backend is alive";
      }
    </script>
  </body>
</html>
